<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <style>
        :root {
            --deep-brown: #3d2b1f; 
            --warm-beige: #f5f5dc;
            --gold-accent: #c5a059;
        }

        body { background: #faf7f2; font-family: 'Segoe UI', sans-serif; }

        #chat-widget {
            position: fixed; bottom: 20px; right: 20px;
            width: 350px; height: 480px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(61, 43, 31, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden;
        }

        #chat-header {
            background: var(--deep-brown); color: var(--warm-beige);
            padding: 15px; text-align: center; font-weight: bold;
            border-bottom: 2px solid var(--gold-accent);
        }

        #chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        .bubble { padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; max-width: 80%; }
        .ai-msg { background: white; color: var(--deep-brown); align-self: flex-start; }
        .user-msg { background: var(--deep-brown); color: var(--warm-beige); align-self: flex-end; }

        .input-bar { padding: 15px; display: flex; gap: 5px; }
        input { flex: 1; border: 1px solid #ccc; padding: 10px; border-radius: 10px; outline: none; }
        button { background: var(--gold-accent); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

 <header>
        <img src="log0.jpg" alt="Site logo" width="120" height="100">
        <button class="book-btn" onclick="window.location.href='booking.html'">Book Now</button>
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">☰</label>
        <ul>
            <li><a href="home.html"><h6>Home</h6></a></li>
            <li><a href="services.html"><h6>Services</h6></a></li>
            <li><a href="Careers.html"><h6>Careers</h6></a></li>
            <li><a href="products.html"><h6>Products</h6></a></li>
            <li><a href="blogs.html"><h6>Blog</h6></a></li>
            <li><a href="about.html"><h6>Locations</h6></a></li>
            <li><a href="membership.html"><h6>Membership</h6></a></li>
            <li><a href="discount.html"><h6>Discounts</h6></a></li>
            <li><a href="login.html"><h6>Testimonials</h6></a></li>
            <li><a href="aiinterface.html"><h6>AI Assistant</h6></a></li>
        </ul>
    </header>
    
<div id="chat-widget">
    <div id="chat-header">Assistant</div>
    <div id="chat-window" id="display">
        <div class="bubble ai-msg">Hello! How can I help you today?</div>
    </div>
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Ask me anything...">
        <button onclick="askAI()">Ask</button>
    </div>
</div>

<script>
    const HF_TOKEN = "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";
    const MODEL_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-v0.1";

    async function askAI() {
        const input = document.getElementById('userInput');
        const window = document.getElementById('chat-window');
        const text = input.value.trim();
        if (!text) return;

        window.innerHTML += <div class="bubble user-msg">${text}</div>;
        input.value = "Thinking...";

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: {
                    "Authorization": Bearer ${HF_TOKEN},
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ inputs: text })
            });

            const result = await response.json();
            const aiResponse = result[0]?.generated_text || "I'm sorry, I couldn't process that.";
            
            input.value = "";
            window.innerHTML += <div class="bubble ai-msg">${aiResponse}</div>;
        } catch (error) {
            window.innerHTML += <div class="bubble ai-msg">Error connecting to AI.</div>;
            input.value = "";
        }
        window.scrollTop = window.scrollHeight;
    }
</script>

</body>
</html>
