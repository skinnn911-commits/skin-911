        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">☰</label>

            <li><a href="aiinterface.html"><h6>AI Assistant</h6></a></li>
        </ul>
    </header>

    <main class="ai-page">
        <div id="chat-widget">
            <div id="chat-header">AI Assistant</div>
            <div id="chat-window">
                <div class="bubble ai-msg">Hello! I'm ready to help. What's on your mind?</div>
            </div>
            <div class="input-bar">
                <input type="text" id="userInput" placeholder="Ask me anything...">
                <button onclick="askAI()">Ask</button>
            </div>
        </div>
    </main>

<script>
    const HF_TOKEN = "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";
    const MODEL_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1";

    async function askAI() {
        const input = document.getElementById('userInput');
        const chatWindow = document.getElementById('chat-window');
        const userText = input.value.trim();

        if (!userText) return;

        chatWindow.innerHTML += `<div class="bubble user-msg">${userText}</div>`;
        input.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        const loadingId = "loading-" + Date.now();
        chatWindow.innerHTML += `<div class="bubble ai-msg" id="${loadingId}">Thinking...</div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;
        input.disabled = true;

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    inputs: userText,
                    parameters: { max_new_tokens: 250, return_full_text: false }
                })
            });

            const result = await response.json();
            let aiText = "I'm having trouble thinking right now.";

            if (Array.isArray(result) && result[0]?.generated_text) {
                aiText = result[0].generated_text.trim();
            } else if (result.error) {
                aiText = "Model is still loading, please try again in a minute.";
            }

            document.getElementById(loadingId).innerText = aiText;
        } catch (error) {
            document.getElementById(loadingId).innerText = `Connection error: ${error.message}`;
        } finally {
            input.disabled = false;
            input.focus();
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    }

    document.getElementById('userInput').addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            askAI();
        }
    });
</script>

</body>
</html>
